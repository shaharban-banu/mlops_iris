name: Iris CI 

on : [push]

jobs :
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with :
          python-version : "3.10"

      - run: |
         pip install --upgrade pip
         pip install -r requirements.txt
         
      - name: run dvc pipeline
        run: dvc repro 

      - name: print success
        run : echo "ci pipeline completed successfully"
